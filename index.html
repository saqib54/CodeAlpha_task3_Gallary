<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1 class="gallery-title">My Gallery</h1>
        <div class="title-underline"></div>
        
        <div class="filter-buttons">
            <button class="active" data-filter="all">All</button>
            <button data-filter="nature">Nature</button>
            <button data-filter="city">City</button>
            <button data-filter="tech">Tech</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&q=80" alt="Nature 1">
                <div class="overlay">
                    <i class="fas fa-search-plus"></i>
                    <p>Explore Nature</p>
                </div>
            </div>
            <div class="gallery-item" data-category="city">
                <img src="https://images.unsplash.com/photo-1449844908441-8829872d2607?w=600&q=80" alt="City 1">
                <div class="overlay">
                    <i class="fas fa-building"></i>
                    <p>City Life</p>
                </div>
            </div>
            <div class="gallery-item" data-category="tech">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&q=80" alt="Tech 1">
                <div class="overlay">
                    <i class="fas fa-microchip"></i>
                    <p>Modern Tech</p>
                </div>
            </div>
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=600&q=80" alt="Nature 2">
                <div class="overlay">
                    <i class="fas fa-leaf"></i>
                    <p>Wilderness</p>
                </div>
            </div>
            <div class="gallery-item" data-category="city">
                <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80" alt="City 2">
                <div class="overlay">
                    <i class="fas fa-city"></i>
                    <p>Urban Views</p>
                </div>
            </div>
            <div class="gallery-item" data-category="tech">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600&q=80" alt="Tech 2">
                <div class="overlay">
                    <i class="fas fa-laptop-code"></i>
                    <p>Development</p>
                </div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="close-btn"><i class="fas fa-times"></i></span>
        <button class="nav-btn prev-btn" id="prev-btn"><i class="fas fa-chevron-left"></i></button>
        <img src="" alt="Lightbox Image" class="lightbox-img" id="lightbox-img">
        <button class="nav-btn next-btn" id="next-btn"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
